#
# ~/.config/alacritty/alacritty.yml
#

env:
  TERM: xterm-256color

window:
  padding:
    x: 2
    y: 2
  decorations: none

font:
  normal:
    family: Roboto Mono
  bold:
    family: Roboto Mono
  italic:
    family: Roboto Mono
  bold_italic:
    family: Roboto Mono

dynamic_title: true
live_config_reload: true
draw_bold_text_with_bright_colors: false
background_opacity: 0.9

mouse:
  url:
    modifiers: Shift

