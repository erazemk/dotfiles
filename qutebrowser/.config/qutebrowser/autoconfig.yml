    global: no-3rdparty
  content.default_encoding:
    global: utf-8
  content.desktop_capture:
    https://discord.com: true
  content.geolocation:
    global: false
  content.media.audio_capture:
    https://discord.com: true
  content.notifications:
    https://app.element.io: true
    https://discord.com: true
  content.pdfjs:
    global: true
  scrolling.smooth:
    global: true
  url.default_page:
    global: https://duckduckgo.com/?kae=d&kl=sl-sl&kad=en_US&kp=-2&kaj=m&k1=-1&kak=-1&kax=-1&kaq=-1&kap=-1&kao=-1&kau=-1
  url.searchengines:
